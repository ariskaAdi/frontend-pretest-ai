name: Deploy Frontend (Production)

# Staging (develop branch) di-handle otomatis oleh Vercel.
# Workflow ini HANYA berjalan untuk production (main branch).

on:
  push:
    branches: [main]

jobs:
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image: ${{ steps.set-image.outputs.image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image name (lowercase)
        id: set-image
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "image=ghcr.io/${OWNER}/pretest-frontend" >> $GITHUB_OUTPUT

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.set-image.outputs.image }}:latest
            ${{ steps.set-image.outputs.image }}:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: "[Production] Deploy Frontend"
    needs: build
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy frontend via docker compose (VPS yang sama)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Update image di .env
            sed -i "s|FRONTEND_IMAGE=.*|FRONTEND_IMAGE=${{ needs.build.outputs.image }}:latest|" /opt/pretest/.env

            cd /opt/pretest
            docker compose pull frontend
            docker compose up -d frontend
            docker image prune -f
